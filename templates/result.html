<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Hasil Prediksi - Klasifikasi Sneakers</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            border: none;
        }
        .card-header {
            background-color: #2c2a4a;
            color: white;
            border-radius: 16px 16px 0 0 !important;
            text-align: center;
            padding: 20px;
        }
        .result-img {
            max-height: 280px;
            border-radius: 12px;
            margin: 0 auto;
            display: block;
        }
        .badge-confidence {
            font-size: 1rem;
            padding: 8px 16px;
        }
        .btn-secondary {
            background-color: #2c2a4a;
            border: none;
        }
        .btn-secondary:hover {
            background-color: #1f1c2c;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card">
            <div class="card-header">
                <h4>Hasil Prediksi</h4>
            </div>
            <div class="card-body p-4 text-center">
                <img src="{{ image_path }}" alt="Gambar Sneakers" class="result-img mb-3">
                <h3 class="mb-2">{{ label | capitalize }}</h3>
                <span class="badge bg-success badge-confidence">Confidence: {{ confidence }}%</span>
                <hr class="my-4">
                <a href="/" class="btn btn-secondary w-100 py-2">Prediksi Gambar Lain</a>
            </div>
        </div>
    </div>
</body>
</html>
