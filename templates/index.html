<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Klasifikasi Sneakers - Xception AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .card {
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            border: none;
        }
        .card-header {
            background-color: #2c2a4a;
            color: white;
            border-radius: 16px 16px 0 0 !important;
            text-align: center;
            padding: 24px;
        }
        .upload-box {
            border: 2px dashed #928dab;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            background: #f8f9fc;
        }
        .btn-primary {
            background-color: #2c2a4a;
            border: none;
        }
        .btn-primary:hover {
            background-color: #1f1c2c;
        }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card">
            <div class="card-header">
                <h3>👟 Klasifikasi Sneakers</h3>
                <p class="mb-0">Transfer Learning Xception + Flask</p>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form action="/predict" method="post" enctype="multipart/form-data">
                    <div class="upload-box mb-3">
                        <input type="file" name="file" accept="image/*" class="form-control" required>
                        <p class="text-muted mt-2 mb-0" style="font-size: 0.85rem;">
                            Unggah gambar sneakers (Nike, Adidas, Converse, Vans, New Balance)
                        </p>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Prediksi Sekarang</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
